<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvalonFlow</title>

      <!-- Favicon as .ico -->
<link rel="icon" href="/favicon.png" type="image/png" sizes="48x48">

    <!-- Structured Data for Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AvalonFlow",
      "url": "https://avalonflow.site",
      "logo": "https://avalonFlow.site/favicon.png"
    }
</script>

<style>
        /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

/* ================= Header Logo Card Neon ================= */
.logo-header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 80px 0;
  background: transparent;
}

.logo-container {
  width: 90px; /* Clean, minimalist desktop/mobile scale */
  height: 90px;
  position: relative;
}

.avalon-icon {
  width: 100%;
  height: 100%;
}

/* Moving the mask element within the SVG */
#mask-rect {
  animation: svgLightPass 4s infinite ease-in-out;
}

/* Smooth light sweep animation keyframes */
@keyframes svgLightPass {
  0% {
    transform: translateX(-100px);
  }
  60% {
    transform: translateX(100px); /* Moves across the vectors smoothly */
  }
  100% {
    transform: translateX(100px); /* Short pause before looping again */
  }
}


    footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 18px 0;
    font-size: 14px;
    color: #555;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.08);
    z-index: 6;
}
    </style>
</head>
<body>
    <!-- Floating Background -->
    <div id="floating-bg"></div>

<header class="logo-header">
  <div class="logo-container">
    <svg class="avalon-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="leftLegGrad" x1="0%" y1="100%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#4a159d" />
          <stop offset="100%" stop-color="#a855f7" />
        </linearGradient>
        
        <linearGradient id="rightLegGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#c084fc" />
          <stop offset="100%" stop-color="#6b21a8" />
        </linearGradient>

        <linearGradient id="lightPassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="white" stop-opacity="1" />
          <stop offset="40%" stop-color="white" stop-opacity="1" />
          <stop offset="50%" stop-color="#ffffff" stop-opacity="0.3" /> <stop offset="60%" stop-color="white" stop-opacity="1" />
          <stop offset="100%" stop-color="white" stop-opacity="1" />
        </linearGradient>
        
        <mask id="shimmerMask">
          <rect x="-100" y="0" width="300" height="100" fill="url(#lightPassGrad)" id="mask-rect" />
        </mask>
      </defs>

      <g mask="url(#shimmerMask)">
        <path d="M25,85 C30,55 40,25 53,15 C56,13 61,16 59,22 C52,35 40,60 38,85 Z" fill="url(#leftLegGrad)" />
        <path d="M38,85 C42,65 55,35 70,30 C75,28 78,32 74,38 C62,55 50,75 48,85 Z" fill="url(#rightLegGrad)" opacity="0.9" />
        <path d="M33,65 C45,62 55,61 65,63 C63,68 52,67 35,69 Z" fill="#e9d5ff" opacity="0.8" />
      </g>
    </svg>
  </div>
</header>


    <!-- Sticky Footer -->
    <footer>
        © 2026 AvalonFlow • Powered by Centrical™
    </footer>

    <script>
        /* ---------- Floating Particles ---------- */
        const bg = document.getElementById('floating-bg');
        const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
        function particle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random()*20+10;
            p.style.width = s+'px';
            p.style.height = s+'px';
            p.style.left = Math.random()*100+'vw';
            p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
            p.style.animationDuration = (Math.random()*20+10)+'s';
            bg.appendChild(p);
            setTimeout(()=>p.remove(),30000);
        }
        setInterval(particle,800);
</script>

</body>
</html>
