<style>
  body {
    font-family: Georgia, serif;
    background: #0d0d0d;
    color: #fff;
    margin: 0;

    flex-direction: column;
    min-height: 100vh;

            /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}
  

/* ---------- Upgraded Seasonal Boot Infrastructure ---------- */
#boot-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  font-family: "Courier New", monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
  overflow: hidden;
  transition: opacity 0.8s ease, backdrop-filter 0.8s ease;
}

/* ---------- FOUR SEASON ENVIRONMENT BACKDROPS ---------- */
#boot-screen.season-spring {
  background: #06140e; /* Emerald charcoal blend */
}
#boot-screen.season-summer {
  background: #070a14; /* Deep midnight space blue */
}
#boot-screen.season-autumn {
  background: #120e0b; /* Earthy wood-smoke charcoal */
}
#boot-screen.season-winter {
  background: #030307; /* Freezing stark deep cosmic black */
}

/* Fade out hook logic */
#boot-screen.fade-out {
  opacity: 0;
  backdrop-filter: blur(12px);
}

/* ---------- SYSTEM TEXT CONSOLE LAYER ---------- */
#boot-text {
  font-size: 16px;
  line-height: 1.8;
  white-space: pre-wrap;
  width: 100%;
  max-width: 420px;       /* Constrains terminal text block width */
  text-align: left;       /* Keeps terminal syntax and bullet strings perfectly straight */
  display: block;
  margin: 0 auto;         /* Centers the code block on the screen */
  z-index: 2;
  box-sizing: border-box;
}

/* ---------- FOUR SEASON TYPOGRAPHY THEMING ENGINE ---------- */

/* Spring Texts (Mint) */
.season-text-spring { color: #00ffa6; }
#boot-screen.season-spring .cursor { background-color: #00ffa6; }
.glow.season-text-spring { text-shadow: 0 0 8px #00ffa6, 0 0 16px rgba(0,255,166,0.4); }

/* Summer Texts (Pure Dashboard Balance Cyan) */
.season-text-summer { color: #00f2fe; }
#boot-screen.season-summer .cursor { background-color: #00f2fe; }
.glow.season-text-summer { text-shadow: 0 0 8px #00f2fe, 0 0 20px rgba(0,242,254,0.6); }

/* Autumn Texts (Harvest Matte Gold) */
.season-text-autumn { color: #fbbf24; }
#boot-screen.season-autumn .cursor { background-color: #fbbf24; }
.glow.season-text-autumn { text-shadow: 0 0 8px #fbbf24, 0 0 16px rgba(251,191,36,0.5); }

/* Winter Texts (Diamond Polar White) */
.season-text-winter { color: #ffffff; }
#boot-screen.season-winter .cursor { background-color: #ffffff; }
.glow.season-text-winter { text-shadow: 0 0 8px #ffffff, 0 0 16px rgba(255,255,255,0.6); }

/* Dynamic Glow Pulse Loop */
.glow {
  animation: pulseGlow 1.5s infinite alternate;
}
@keyframes pulseGlow {
  0% { opacity: 0.85; }
  100% { opacity: 1; }
}

/* ---------- CLEAN AUTOMATED LOADING BAR FIX ---------- */
.suspense-loader-row {
    margin: 15px 0;
    display: block;
    width: 100%;
}
.suspense-pulse-text {
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    animation: terminalFlash 1.2s ease-in-out infinite alternate;
}
/* Assign color values dynamically based on current parent setup rules */
#boot-screen.season-spring .suspense-pulse-text { color: #00ffa6; }
#boot-screen.season-summer .suspense-pulse-text { color: #00f2fe; }
#boot-screen.season-autumn .suspense-pulse-text { color: #fbbf24; }
#boot-screen.season-winter .suspense-pulse-text { color: #ffffff; }

@keyframes terminalFlash {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
}

/* Blinking terminal tracking block cursor */
.cursor {
  display: inline-block;
  width: 10px; height: 18px;
  margin-left: 6px;
  vertical-align: middle;
  animation: blink 1s infinite;
}
@keyframes blink {
  0%,50%,100% { opacity: 1; }
  25%,75% { opacity: 0; }
}

/* Final screen entrance glow rule formatting variables */
.final-glow {
  font-weight: 700;
  animation: finalGlow 1.2s ease-out forwards;
}
@keyframes finalGlow {
  0% { opacity: 0; transform: scale(0.98); }
  100% { opacity: 1; transform: scale(1); }
}

@media (max-width: 768px) {

<script>
  // Floating Particles
  const bg = document.getElementById('floating-bg');
  const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
  function particle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*20+10;
    p.style.width = s+'px';
    p.style.height = s+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
    p.style.animationDuration = (Math.random()*20+10)+'s';
    bg.appendChild(p);
    setTimeout(()=>p.remove(),30000);
  }
  setInterval(particle,800);

        /* ---------- Notification ---------- */
        window.addEventListener("load", () => {
            const notification = document.getElementById("planNotification");
            notification.textContent = "Welcome! Let’s get started";
            setTimeout(() => notification.classList.add("show"), 300);
            setTimeout(() => notification.classList.remove("show"), 3300);
        });

function getFingerprint() {
  return btoa(
    navigator.userAgent +
    screen.width + screen.height +
    navigator.language
  );
}

// US Eastern Date
function getUSEasternDate() {
  const now = new Date();
  const estString = now.toLocaleString("en-US", { timeZone: "America/New_York" });
  return new Date(estString);
}

const monthNames = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
                    "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

const estDate = getUSEasternDate();
const monthIndex = estDate.getMonth();
const year = estDate.getFullYear();

const currentMonthUpper = monthNames[monthIndex];
const currentMonthNormal = currentMonthUpper.charAt(0) + currentMonthUpper.slice(1).toLowerCase();

// ---------- DYNAMIC SEASONAL DATA ROUTER ----------
let currentSeason = "";
let baseParticleColor = "0, 255, 166"; // Default Mint

if (monthIndex === 2 || monthIndex === 3 || monthIndex === 4) {
    currentSeason = "spring";      
    baseParticleColor = "0, 255, 166"; 
} else if (monthIndex === 5 || monthIndex === 6 || monthIndex === 7) {
    currentSeason = "summer";      
    baseParticleColor = "0, 242, 254"; 
} else if (monthIndex === 8 || monthIndex === 9 || monthIndex === 10) {
    currentSeason = "autumn";      
    baseParticleColor = "251, 191, 36"; 
} else {
    currentSeason = "winter";      
    baseParticleColor = "255, 255, 255"; 
}

const urlParams = new URLSearchParams(window.location.search);
const forcedSeason = urlParams.get('forceSeason');

if (forcedSeason && ["spring", "summer", "autumn", "winter"].includes(forcedSeason.toLowerCase())) {
    currentSeason = forcedSeason.toLowerCase();

    if (currentSeason === "spring") baseParticleColor = "0, 255, 166";
    else if (currentSeason === "summer") baseParticleColor = "0, 242, 254";
    else if (currentSeason === "autumn") baseParticleColor = "251, 191, 36";
    else if (currentSeason === "winter") baseParticleColor = "255, 255, 255";
}

const bootScreenElement = document.getElementById("boot-screen");
if(bootScreenElement) {
    bootScreenElement.className = ""; 
    bootScreenElement.classList.add(`season-${currentSeason}`);
}

// ---------- RECONFIGURED CORPORATE TREASURY TERMINAL LOGS ----------
const lines = [
  "> Initializing AvalonFlow...",
  "> Connecting Treasury Nodes...",
  "> Syncing Kairos System™...",
  `> Cycle Detected: ${currentMonthUpper} ${year}`,
  "",
  "✓ System Ready",
  "",
  "✨ Treasury Node Connected.",
  "",
  "Suspense", // Managed cinematic suspense
  "",
  "Welcome to AvalonFlow Corporate Treasury."
];

const textElement = document.getElementById("boot-text");
const sound = document.getElementById("type-sound");
let lineIndex=0, charIndex=0;

const isMobile = window.innerWidth < 768;
const typingSpeed = isMobile ? 15 : 40; 
const lineDelay = isMobile ? 250 : 400;

// ---------- CHROME AUDIO AUTOPLAY UNLOCK ENGINE ----------
let audioUnlocked = false;
function unlockAudio() {
  if (!audioUnlocked && sound) {
    sound.play().then(() => {
      sound.pause();
      sound.currentTime = 0;
      audioUnlocked = true;
      window.removeEventListener('click', unlockAudio);
      window.removeEventListener('touchstart', unlockAudio);
    }).catch(() => {});
  }
}
window.addEventListener('click', unlockAudio);
window.addEventListener('touchstart', unlockAudio);

// PARTICLES CANVAS SETUP
const canvas = document.getElementById("particle-canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];
const particleCount = 80;

for(let i=0; i<particleCount; i++){
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 2 + 1,
    alpha: Math.random() * 0.3 + 0.1,
    speedY: Math.random() * 0.5 + 0.1,
    angle: Math.random() * Math.PI * 2 
  });
}

function drawParticles(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${baseParticleColor}, ${p.alpha})`;
    ctx.fill();

    if (currentSeason === "spring") {
        p.y -= p.speedY * 0.8;
        p.x += Math.sin(p.angle) * 0.4;
        p.angle += 0.02;
    } else if (currentSeason === "summer") {
        p.y -= p.speedY * 1.5;
    } else if (currentSeason === "autumn") {
        p.y += p.speedY * 0.8;
        p.x += Math.sin(p.angle) * 0.5;
        p.angle += 0.01;
    } else {
        p.y -= p.speedY * 0.2;
    }

    if (p.y < 0 && currentSeason !== "autumn") p.y = canvas.height;
    if (p.y > canvas.height && currentSeason === "autumn") p.y = 0;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;

    p.alpha += (Math.random() - 0.5) * 0.02;
    if(p.alpha < 0.05) p.alpha = 0.05;
    if(p.alpha > 0.40) p.alpha = 0.40;
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

function pulseParticles(){
  particles.forEach(p => {
    p.alpha = Math.min(p.alpha + 0.2, 0.6);
  });
}

function triggerProcessingWave(){
  const duration = 1200;
  const startTime = performance.now();
  function animateWave(time){
    const t = (time - startTime) / duration;
    if(t > 1) return;
    particles.forEach(p => {
      const dx = p.x - canvas.width / 2;
      const dy = p.y - canvas.height / 2;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const pulse = Math.max(0, 1 - dist / (canvas.width / 2));
      p.alpha = Math.min(p.alpha + 0.6 * pulse, 0.7);
    });
    requestAnimationFrame(animateWave);
  }
  animateWave(performance.now());
}

function playSound(){
  if(sound){ sound.currentTime = 0; sound.play().catch(() => {}); }
  pulseParticles();
}

// SECURE TYPEWRITER CORE
function typeLine(){
  if(lineIndex >= lines.length){
    setTimeout(() => {
      document.getElementById("boot-screen").classList.add("fade-out"); 
      setTimeout(() => { document.getElementById("boot-screen").style.display = "none"; }, 1000);
    }, 1200);
    return;
  }

  let currentLine = lines[lineIndex];

  if(currentLine === "Suspense"){
    const suspenseContainer = document.createElement("div");
    suspenseContainer.className = "suspense-loader-row";
    suspenseContainer.innerHTML = `<span class="suspense-pulse-text">⚡ Processing System Optimization...</span>`;
    textElement.appendChild(suspenseContainer);

    setTimeout(() => {
      suspenseContainer.remove();
      lineIndex++;
      setTimeout(typeLine, 300);
    }, 1800); 
    return;
  }

  if(currentLine.includes("Welcome to AvalonFlow Corporate Treasury.")){
    triggerProcessingWave();
    const span = document.createElement("span");
    span.className = `final-glow glow season-text-${currentSeason}`;
    span.textContent = currentLine;
    textElement.appendChild(span);
    lineIndex++;
    charIndex = 0;
    setTimeout(typeLine, lineDelay);
    return;
  }

  if(charIndex < currentLine.length){
    const charNode = document.createTextNode(currentLine[charIndex]);
    textElement.appendChild(charNode);
    charIndex++;
    if(Math.random() > 0.6) playSound();
    setTimeout(typeLine, typingSpeed);
  } else {
    textElement.appendChild(document.createElement("br"));

    if(currentLine.includes("System Ready") || currentLine.includes("Treasury Node Initialized.")){
      const statusBlock = document.createElement("span");
      statusBlock.className = `glow season-text-${currentSeason}`;
      statusBlock.textContent = currentLine;
      textElement.innerHTML = textElement.innerHTML.replace(currentLine, statusBlock.outerHTML);
    }

    lineIndex++; 
    charIndex = 0;
    setTimeout(typeLine, lineDelay);
  }
}

// ---------- UPGRADED 24-HOUR TIME LOCK ENGINE ----------
const storageLockKey = "avalon_treasury_boot_timestamp";
const lastBootTime = localStorage.getItem(storageLockKey);
const currentTimeStamp = estDate.getTime(); 

const twentyFourHours = 24 * 60 * 60 * 1000; // 24 Hours in milliseconds
const isTestingSeason = urlParams.has('forceSeason');

if (isTestingSeason || !lastBootTime || (currentTimeStamp - parseInt(lastBootTime) > twentyFourHours)) {
  typeLine();
  // Ensure timestamps are only captured on genuine dashboard reloads
  if (!isTestingSeason) {
    localStorage.setItem(storageLockKey, currentTimeStamp.toString());
  }
} else {
  document.getElementById("boot-screen").style.display = "none";
}


// Any section except Section 4
if (localStorage.getItem('formSubmitted') === 'true') {
  window.location.href = 'https://membership.avalonflow.site/signin';
  }
</script>
